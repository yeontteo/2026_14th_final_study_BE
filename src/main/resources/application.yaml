    exclude: org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/auth_db?serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:yeontteo}
    password: ${DB_PASSWORD:namys0103!m}
